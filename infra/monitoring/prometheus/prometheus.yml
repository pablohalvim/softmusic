global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: softmusic-local
    env: ${SOFTMUSIC_ENV:-local}

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: softmusic-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: softmusic-api

  - job_name: softmusic-python-ai
    metrics_path: /metrics
    static_configs:
      - targets: ["python-ai:8000"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        replacement: softmusic-python-ai

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]
