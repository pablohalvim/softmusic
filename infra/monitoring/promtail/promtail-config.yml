server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Coleta APENAS containers do SoftMusic. Sem este keep, o Promtail
      # descobre todos os containers do host (jenkins, sportshub-*,
      # mariadb-futsaude, etc.) e tenta enviar o histórico antigo deles,
      # que o Loki rejeita com 400 "timestamp too old".
      - source_labels: ["__meta_docker_container_name"]
        regex: "/softmusic-.*"
        action: keep
      - source_labels: ["__meta_docker_container_name"]
        regex: "/(.*)"
        target_label: container
      - source_labels: ["__meta_docker_container_name"]
        regex: "/softmusic-(.*)"
        target_label: service
        replacement: softmusic-${1}
      - source_labels: ["__meta_docker_container_log_stream"]
        target_label: stream
