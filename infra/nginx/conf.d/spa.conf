server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # BFF — mesmo padrão Sportshub: /api no browser → api:8080 na rede Docker.
    # Evita rota /api separada no EasyPanel (Strip Prefix).
    location /api/ {
        proxy_pass http://api:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300s;
        client_max_body_size 100m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Service worker: nunca cachear, para propagar novas versões.
    location = /pwa-sw.js {
        default_type application/javascript;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Manifesto de versão consumido pelo aviso de atualização.
    location = /version.json {
        default_type application/json;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    location = /manifest.webmanifest {
        default_type application/manifest+json;
    }
}
