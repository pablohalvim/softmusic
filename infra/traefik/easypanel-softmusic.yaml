# SoftMusic — rotas Traefik para EasyPanel (file provider)
# Copie para: /etc/easypanel/traefik/config/custom.yaml
# (ou inclua via merge manual) e reinicie o Traefik no painel EasyPanel.
#
# Pré-requisito: containers SoftMusic na MESMA rede Docker que o Traefik
# (ver docs/producao/easypanel-traefik.md).

http:
  middlewares:
    softmusic-strip-api:
      stripPrefix:
        prefixes:
          - /api

    softmusic-admin-api-chain:
      chain:
        middlewares:
          - softmusic-strip-api
          - softmusic-add-admin-prefix

    softmusic-add-admin-prefix:
      addPrefix:
        prefix: /admin

    softmusic-large-upload:
      buffering:
        maxRequestBodyBytes: 104857600

  routers:
    # --- Landing ---
    softmusic-lp:
      rule: Host(`softmusic.com.br`) || Host(`www.softmusic.com.br`)
      entryPoints:
        - websecure
      service: softmusic-lp
      tls:
        certResolver: letsencrypt

    # --- App: API (prioridade maior que SPA) ---
    softmusic-app-api:
      rule: Host(`app.softmusic.com.br`) && PathPrefix(`/api`)
      priority: 100
      entryPoints:
        - websecure
      service: softmusic-api
      middlewares:
        - softmusic-strip-api
        - softmusic-large-upload
      tls:
        certResolver: letsencrypt

    softmusic-app-web:
      rule: Host(`app.softmusic.com.br`)
      priority: 1
      entryPoints:
        - websecure
      service: softmusic-web
      tls:
        certResolver: letsencrypt

    # --- Admin ---
    softmusic-admin-api:
      rule: Host(`admin.softmusic.com.br`) && PathPrefix(`/api`)
      priority: 100
      entryPoints:
        - websecure
      service: softmusic-api
      middlewares:
        - softmusic-admin-api-chain
      tls:
        certResolver: letsencrypt

    softmusic-admin-web:
      rule: Host(`admin.softmusic.com.br`)
      priority: 1
      entryPoints:
        - websecure
      service: softmusic-admin-web
      tls:
        certResolver: letsencrypt

    # --- Grafana ---
    softmusic-grafana:
      rule: Host(`grafana.softmusic.com.br`)
      entryPoints:
        - websecure
      service: softmusic-grafana
      tls:
        certResolver: letsencrypt

  services:
    softmusic-lp:
      loadBalancer:
        servers:
          - url: http://softmusic-lp:80

    softmusic-web:
      loadBalancer:
        servers:
          - url: http://softmusic-web:80

    softmusic-admin-web:
      loadBalancer:
        servers:
          - url: http://softmusic-admin-web:80

    softmusic-api:
      loadBalancer:
        servers:
          - url: http://softmusic-api:8080
        passHostHeader: true

    softmusic-grafana:
      loadBalancer:
        servers:
          - url: http://softmusic-grafana:3000
        passHostHeader: true
