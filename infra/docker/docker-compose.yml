# =============================================================================
# SoftMusic — Docker Compose (desenvolvimento e base de produção)
# =============================================================================
# Uso:
#   Infra only:  docker compose -f infra/docker/docker-compose.yml --profile infra up -d
#   Full stack:  docker compose ... --profile infra --profile app up -d --build
#   + Monitoring: adicionar --profile observability
# =============================================================================

name: softmusic

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck-defaults: &healthcheck-defaults
  interval: 10s
  timeout: 5s
  retries: 5
  start_period: 30s

services:
  # ---------------------------------------------------------------------------
  # Infraestrutura (profile: infra)
  # ---------------------------------------------------------------------------
  mysql:
    profiles: [infra, app]
    image: mysql:8.4
    container_name: softmusic-mysql
    restart: unless-stopped
    logging: *default-logging
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?MYSQL_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-softmusic}
      MYSQL_USER: ${MYSQL_USER:-softmusic}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?MYSQL_PASSWORD is required}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - softmusic_mysql_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]

  redis:
    profiles: [infra, app]
    image: redis:7-alpine
    container_name: softmusic-redis
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - softmusic_redis_data:/data
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "redis-cli", "ping"]

  rabbitmq:
    profiles: [infra, app]
    image: rabbitmq:3.13-management-alpine
    container_name: softmusic-rabbitmq
    restart: unless-stopped
    logging: *default-logging
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-softmusic}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - softmusic_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]

  # ---------------------------------------------------------------------------
  # Aplicações (profile: app) — requer apps/ implementados
  # ---------------------------------------------------------------------------
  api:
    profiles: [app]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    container_name: softmusic-api
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      python-ai:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_HOST: 0.0.0.0
      API_PORT: ${API_PORT:-8080}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost:5174}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PYTHON_AI_URL: http://python-ai:8000
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY:?JWT_PRIVATE_KEY is required}
      JWT_PUBLIC_KEY: ${JWT_PUBLIC_KEY:-}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_SERVICE_NAME: softmusic-api
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - softmusic_uploads:/app/uploads
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/live"]

  python-ai:
    profiles: [app]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.python-ai
      args:
        PYTORCH_IMAGE: ${PYTORCH_IMAGE:-pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime}
    container_name: softmusic-python-ai
    restart: unless-stopped
    logging: *default-logging
    gpus: ${DOCKER_GPUS:-all}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      PYTHON_AI_HOST: 0.0.0.0
      PYTHON_AI_PORT: ${PYTHON_AI_PORT:-8000}
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-1}
      DEMUCS_ENABLED: ${DEMUCS_ENABLED:-true}
      DEMUCS_MODEL: ${DEMUCS_MODEL:-htdemucs_6s}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-softmusic-uploads}
      STORAGE_LOCAL_PATH: /app/uploads
      MODELS_CACHE_DIR: /models
      ANALYSIS_JSON_VERSION: ${ANALYSIS_JSON_VERSION:-1.0.0}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_SERVICE_NAME: softmusic-python-ai
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CPF_PEPPER: ${CPF_PEPPER:-dev-cpf-pepper-change-me}
      ADMIN_JWT_PRIVATE_KEY: ${ADMIN_JWT_PRIVATE_KEY:-dev-admin-change-in-production-min-32-chars}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      ASAAS_API_KEY: ${ASAAS_API_KEY:-}
      ASAAS_ENVIRONMENT: ${ASAAS_ENVIRONMENT:-sandbox}
      ASAAS_WEBHOOK_TOKEN: ${ASAAS_WEBHOOK_TOKEN:-}
    ports:
      - "${PYTHON_AI_PORT:-8000}:8000"
    volumes:
      - softmusic_uploads:/app/uploads
      - softmusic_models:/models
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]

  worker:
    profiles: [app]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.python-ai
      args:
        PYTORCH_IMAGE: ${PYTORCH_IMAGE:-pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime}
    container_name: softmusic-worker
    restart: unless-stopped
    logging: *default-logging
    gpus: ${DOCKER_GPUS:-all}
    command: ["celery", "-A", "app.worker", "worker", "--loglevel=info", "--concurrency=${CELERY_CONCURRENCY:-1}", "-Q", "analysis,billing"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      python-ai:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      CELERY_CONCURRENCY: ${CELERY_CONCURRENCY:-1}
      DEMUCS_ENABLED: ${DEMUCS_ENABLED:-true}
      DEMUCS_MODEL: ${DEMUCS_MODEL:-htdemucs_6s}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-softmusic-uploads}
      STORAGE_LOCAL_PATH: /app/uploads
      MODELS_CACHE_DIR: /models
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
      NVIDIA_VISIBLE_DEVICES: ${NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      OTEL_SERVICE_NAME: softmusic-worker
    volumes:
      - softmusic_uploads:/app/uploads
      - softmusic_models:/models

  scheduler:
    profiles: [app]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.python-ai
      args:
        PYTORCH_IMAGE: ${PYTORCH_IMAGE:-pytorch/pytorch:2.5.1-cuda12.4-cudnn9-runtime}
    container_name: softmusic-scheduler
    restart: unless-stopped
    logging: *default-logging
    command: ["celery", "-A", "app.worker", "beat", "--loglevel=info"]
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      python-ai:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      OTEL_SERVICE_NAME: softmusic-scheduler

  web:
    profiles: [app]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
        VITE_PWA_ENABLED: ${VITE_PWA_ENABLED:-true}
    container_name: softmusic-web
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-5173}:80"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-sf", "http://localhost:80"]

  lp:
    profiles: [app]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.lp
      args:
        VITE_APP_URL: ${VITE_APP_URL:-https://app.softmusic.com.br}
    container_name: softmusic-lp
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${LP_PORT:-5180}:80"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-sf", "http://localhost:80"]

  admin-web:
    profiles: [app]
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.admin-web
      args:
        VITE_API_URL: ${API_BASE_URL:-http://localhost:8080}
    container_name: softmusic-admin-web
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "${ADMIN_PORT:-5174}:80"
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD", "curl", "-sf", "http://localhost:80"]

  # ---------------------------------------------------------------------------
  # Observabilidade (profile: observability)
  # ---------------------------------------------------------------------------
  prometheus:
    profiles: [observability]
    image: prom/prometheus:v2.53.0
    container_name: softmusic-prometheus
    restart: unless-stopped
    logging: *default-logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ../monitoring/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - softmusic_prometheus_data:/prometheus

  loki:
    profiles: [observability]
    image: grafana/loki:3.1.0
    container_name: softmusic-loki
    restart: unless-stopped
    logging: *default-logging
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ../monitoring/loki/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - softmusic_loki_data:/loki

  promtail:
    profiles: [observability]
    image: grafana/promtail:3.1.0
    container_name: softmusic-promtail
    restart: unless-stopped
    logging: *default-logging
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ../monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki

  grafana:
    profiles: [observability]
    image: grafana/grafana:11.1.0
    container_name: softmusic-grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3000}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ../monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ../monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - softmusic_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  otel-collector:
    profiles: [observability, app]
    image: otel/opentelemetry-collector-contrib:0.106.0
    container_name: softmusic-otel-collector
    restart: unless-stopped
    logging: *default-logging
    command: ["--config=/etc/otelcol/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ../monitoring/otel/otel-collector-config.yaml:/etc/otelcol/config.yaml:ro

volumes:
  softmusic_mysql_data:
  softmusic_redis_data:
  softmusic_rabbitmq_data:
  softmusic_uploads:
  softmusic_models:
  softmusic_prometheus_data:
  softmusic_loki_data:
  softmusic_grafana_data:

networks:
  default:
    name: softmusic-network
