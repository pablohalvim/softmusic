# =============================================================================
# SoftMusic — Docker Compose overlay de produção
# =============================================================================
# Uso:
#   docker compose -f infra/docker/docker-compose.yml \
#     -f infra/docker/docker-compose.prod.yml \
#     --env-file /opt/softmusic/.env.production \
#     --profile infra --profile app --profile observability up -d
# =============================================================================

services:
  mysql:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  redis:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  rabbitmq:
    restart: always
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  api:
    restart: always
    image: ${SOFTMUSIC_API_IMAGE:-softmusic-api:latest}
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  python-ai:
    restart: always
    image: ${SOFTMUSIC_PYTHON_AI_IMAGE:-softmusic-python-ai:latest}
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 2G

  worker:
    restart: always
    image: ${SOFTMUSIC_PYTHON_AI_IMAGE:-softmusic-python-ai:latest}
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 2G

  web:
    restart: always
    image: ${SOFTMUSIC_WEB_IMAGE:-softmusic-web:latest}
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  lp:
    restart: always
    image: ${SOFTMUSIC_LP_IMAGE:-softmusic-lp:latest}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  admin-web:
    restart: always
    image: ${SOFTMUSIC_ADMIN_WEB_IMAGE:-softmusic-admin-web:latest}
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  scheduler:
    restart: always
    image: ${SOFTMUSIC_PYTHON_AI_IMAGE:-softmusic-python-ai:latest}
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  nginx:
    profiles: [app]
    image: nginx:1.27-alpine
    container_name: softmusic-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/conf.d:/etc/nginx/conf.d:ro
      - softmusic_certbot_certs:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      lp:
        condition: service_started

  certbot:
    profiles: [app]
    image: certbot/certbot:latest
    container_name: softmusic-certbot
    volumes:
      - softmusic_certbot_certs:/etc/letsencrypt
      - softmusic_certbot_www:/var/www/certbot
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

volumes:
  softmusic_certbot_certs:
  softmusic_certbot_www:
