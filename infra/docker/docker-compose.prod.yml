# =============================================================================
# SoftMusic — Docker Compose overlay de produção
# =============================================================================
# Modelo igual ao Sportshub: cada app publica uma porta no HOST; o reverse
# proxy da VPS (EasyPanel / Nginx) aponta para 127.0.0.1:PORTA.
#
# Portas default (não conflitam com Sportshub 4000/3333 nem Jenkins 8080):
#   LP 4100 | Web 4101 | Admin 4102 | API 8081 | Grafana 4103
# =============================================================================

services:
  mysql:
    restart: unless-stopped
    ports:
      - "127.0.0.1:3307:3307"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G

  redis:
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  rabbitmq:
    restart: unless-stopped
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  api:
    restart: unless-stopped
    image: ${SOFTMUSIC_API_IMAGE:-softmusic/api:latest}
    pull_policy: never
    ports:
      - "${API_PORT:-8081}:8080"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 512M

  python-ai:
    restart: unless-stopped
    image: ${SOFTMUSIC_PYTHON_AI_IMAGE:-softmusic/python-ai:latest}
    pull_policy: never
    ports: !reset []
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 2G

  worker:
    restart: unless-stopped
    image: ${SOFTMUSIC_PYTHON_AI_IMAGE:-softmusic/python-ai:latest}
    pull_policy: never
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "1"
          memory: 2G

  web:
    restart: unless-stopped
    image: ${SOFTMUSIC_WEB_IMAGE:-softmusic/web:latest}
    pull_policy: never
    ports:
      - "${WEB_PORT:-4101}:80"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M

  lp:
    restart: unless-stopped
    image: ${SOFTMUSIC_LP_IMAGE:-softmusic/lp:latest}
    pull_policy: never
    ports:
      - "${LP_PORT:-4100}:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  admin-web:
    restart: unless-stopped
    image: ${SOFTMUSIC_ADMIN_WEB_IMAGE:-softmusic/admin-web:latest}
    pull_policy: never
    ports:
      - "${ADMIN_PORT:-4102}:80"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M

  scheduler:
    restart: unless-stopped
    image: ${SOFTMUSIC_PYTHON_AI_IMAGE:-softmusic/python-ai:latest}
    pull_policy: never
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  prometheus:
    ports: !reset []

  loki:
    ports: !reset []

  grafana:
    ports:
      - "${GRAFANA_PORT:-4103}:3000"

  otel-collector:
    ports: !reset []
