# =============================================================================
# SoftMusic — overlay EasyPanel / Traefik (Opção B)
# =============================================================================
# Desativa nginx/certbot do SoftMusic (Traefik do EasyPanel usa :80/:443).
# A rede easypanel é conectada APÓS o container subir — via
# connect-traefik-network.sh (evita "network sandbox not found" no recreate).
# =============================================================================

services:
  nginx:
    profiles:
      - edge-nginx-disabled

  certbot:
    profiles:
      - edge-nginx-disabled
