# =============================================================================
# SoftMusic — Infraestrutura LEGACY (MariaDB 10.5.28 para CPUs antigas)
# =============================================================================
# Use este overlay quando o servidor NÃO suportar MySQL 8.4.
# MariaDB 10.5 é wire-compatible com o protocolo MySQL (aiomysql/pymysql
# funcionam sem mudança no DATABASE_URL) e roda em CPUs sem AVX/AVX2.
#
# Uso:
#   docker compose -f infra/docker/docker-compose.infra.yml \
#     -f infra/docker/docker-compose.infra-legacy.yml \
#     --env-file /opt/softmusic/.env.production \
#     --profile infra --profile observability up -d
# =============================================================================

services:
  mysql:
    image: mariadb:10.5.28
    # Obs.: MariaDB NÃO aceita --default-authentication-plugin (flag exclusiva
    # do MySQL 8) — incluí-lo faz o container abortar na inicialização.
    command:
      - --port=3307
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
