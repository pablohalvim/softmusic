# =============================================================================
# SoftMusic — Infraestrutura LEGACY (MySQL 5.7 para CPUs antigas)
# =============================================================================
# Use este overlay quando o servidor NÃO suportar MySQL 8.4.
#
# Uso:
#   docker compose -f infra/docker/docker-compose.infra.yml \
#     -f infra/docker/docker-compose.infra-legacy.yml \
#     --env-file /opt/softmusic/.env.production \
#     --profile infra --profile observability up -d
# =============================================================================

services:
  mysql:
    image: mysql:5.7
    command:
      - --port=3307
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max-connections=200
      - --innodb-buffer-pool-size=256M
      - --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
